name: CI — Lint, Test & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────
  # Linting
  # ─────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install ruff mypy

      - name: Run Ruff linter
        run: ruff check src/ tests/ scripts/

      - name: Run Ruff formatter check
        run: ruff format --check src/ tests/ scripts/

  # ─────────────────────────────────────────────────────
  # Unit Tests
  # ─────────────────────────────────────────────────────
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r docker/pipeline/requirements.txt
          pip install pytest pytest-cov ruff

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  # ─────────────────────────────────────────────────────
  # Docker Build
  # ─────────────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Dagster image
        run: docker build -t dqm-dagster:test docker/dagster/

      - name: Build pipeline image
        run: docker build -t dqm-pipeline:test -f docker/pipeline/Dockerfile .

      - name: Verify Docker Compose config
        run: docker compose config --quiet
